<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sandino lindo</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #f0f9ff, #cbebff);
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .sandino-img {
      width: 180px;   /* tamaño controlado */
      height: auto;   /* mantiene proporción */
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .vidas {
      font-size: 24px;
      color: #e74c3c;
      margin: 10px 0;
    }
    .puntaje {
      font-size: 22px;
      color: #27ae60;
      margin: 10px 0;
    }
    .pregunta {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
    }
    .pregunta p {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #2980b9;
    }
    .barra {
      width: 80%;
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      margin: 20px auto;
      overflow: hidden;
    }
    .progreso {
      height: 100%;
      width: 0%;
      background: #27ae60;
      transition: width 0.5s;
    }
  </style>
</head>
<body>
  <!-- Imagen de Sandino -->
  <img src="sandino.jpg" alt="Imagen de Sandino" class="sandino-img">
  
  <h1>Juego sobre Sandino</h1>
  <p class="vidas">❤️❤️❤️</p>
  <p class="puntaje">Puntaje: 0</p>
  <div class="barra"><div class="progreso"></div></div>
  <div id="juego"></div>

  <script>
    const preguntas = [
      { q: "¿En qué año nació Sandino?", opciones: ["1895","1905","1915"], correcta: 0 },
      { q: "¿Qué valor defendía Sandino?", opciones: ["Justicia social","Riqueza personal","Neutralidad política"], correcta: 0 },
      { q: "¿Contra quién luchó Sandino?", opciones: ["Intervención extranjera","Gobierno local","Comerciantes"], correcta: 0 },
      { q: "¿Dónde nació Sandino?", opciones: ["Niquinohomo","Managua","León"], correcta: 0 },
      { q: "¿Qué símbolo usaba Sandino?", opciones: ["Sombrero alado","Bandera roja","Escudo dorado"], correcta: 0 },
      { q: "¿Cuál fue su legado principal?", opciones: ["Defensa de la soberanía","Expansión territorial","Comercio internacional"], correcta: 0 }
    ];

    let indice = 0;
    let puntaje = 0;
    let vidas = 3;

    function mostrarPregunta() {
      if (indice >= preguntas.length || vidas <= 0) {
        document.getElementById("juego").innerHTML =
          `<h2>Juego terminado</h2><p>Puntaje final: ${puntaje}</p>`;
        return;
      }
      const p = preguntas[indice];
      let html = `<div class="pregunta"><p>${p.q}</p>`;
      p.opciones.forEach((op, i) => {
        html += `<button onclick="responder(${i})">${op}</button>`;
      });
      html += "</div>";
      document.getElementById("juego").innerHTML = html;

      // actualizar barra de progreso
      const progreso = ((indice) / preguntas.length) * 100;
      document.querySelector(".progreso").style.width = progreso + "%";
    }

    function responder(opcion) {
      const p = preguntas[indice];
      if (opcion === p.correcta) {
        puntaje += 10;
        document.querySelector(".puntaje").textContent = "Puntaje: " + puntaje;
      } else {
        vidas--;
        document.querySelector(".vidas").textContent = "❤️".repeat(vidas);
      }
      indice++;
      mostrarPregunta();
    }

    mostrarPregunta();
  </script>
</body>
</html>
